<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warhammer 40K - Human vs AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* -- Pregame overlay -- */
#pregame-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}
#pregame-box {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 12px;
  padding: 32px 48px;
  text-align: center;
  max-width: 420px;
}
#pregame-box h2 {
  color: #e94560;
  font-size: 22px;
  margin-bottom: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#pregame-box p {
  color: #aaa;
  font-size: 13px;
  margin-bottom: 20px;
}
.pregame-btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: 2px solid #0f3460;
  border-radius: 6px;
  cursor: pointer;
  font-size: 15px;
  font-weight: bold;
  transition: all 0.2s;
  text-transform: uppercase;
}
#btn-go-first {
  background: #2d1b36;
  color: #e94560;
  border-color: #e94560;
}
#btn-go-first:hover { background: #4d2b56; }
#btn-go-second {
  background: #1b2d36;
  color: #4ecdc4;
  border-color: #4ecdc4;
}
#btn-go-second:hover { background: #2b4d46; }

/* -- Sidebar -- */
#sidebar {
  width: 360px;
  min-width: 360px;
  background: #16213e;
  display: flex;
  flex-direction: column;
  border-right: 2px solid #0f3460;
}
#sidebar h1 {
  font-size: 16px;
  padding: 12px;
  text-align: center;
  background: #0f3460;
  color: #e94560;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#info-bar {
  display: flex;
  justify-content: space-between;
  padding: 8px 12px;
  background: #1a1a2e;
  font-size: 13px;
  border-bottom: 1px solid #0f3460;
}
.info-item { text-align: center; }
.info-label { font-size: 10px; color: #888; text-transform: uppercase; }
.info-value { font-size: 16px; font-weight: bold; }
.vp-you { color: #e94560; }
.vp-ai { color: #4ecdc4; }

#phase-bar {
  padding: 10px 12px;
  text-align: center;
  font-size: 14px;
  font-weight: bold;
  border-bottom: 1px solid #0f3460;
}
.your-turn { background: #2d1b36; color: #e94560; }
.ai-turn { background: #1b2d36; color: #4ecdc4; }
.game-over-bar { background: #3d1b1b; color: #ffd700; }

#move-hint {
  display: none;
  padding: 6px 12px;
  background: #1b2d36;
  color: #4ecdc4;
  font-size: 12px;
  text-align: center;
  border-bottom: 1px solid #0f3460;
}

#btn-row {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  border-bottom: 1px solid #0f3460;
}
button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  transition: background 0.2s;
}
#btn-pass { background: #533; color: #e94560; }
#btn-pass:hover { background: #744; }
#btn-ai-step { background: #1b3d36; color: #4ecdc4; }
#btn-ai-step:hover { background: #2b5d46; }
#btn-reset { background: #353; color: #4ecdc4; }
#btn-reset:hover { background: #474; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

#unit-detail {
  padding: 10px 12px;
  font-size: 12px;
  border-bottom: 1px solid #0f3460;
  min-height: 80px;
  background: #1a1a2e;
}
#unit-detail h3 { font-size: 14px; margin-bottom: 4px; }
.stat-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0; }
.stat { background: #0f3460; padding: 2px 6px; border-radius: 3px; font-size: 11px; }

#actions-panel {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
#actions-panel h3 {
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.action-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 6px 8px;
  margin-bottom: 3px;
  background: #1a2744;
  color: #ccc;
  border: 1px solid #0f3460;
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  flex: none;
  transition: background 0.15s;
}
.action-btn:hover { background: #2a3754; border-color: #e94560; color: #fff; }
.action-btn.shoot { border-left: 3px solid #e94560; }
.action-btn.charge { border-left: 3px solid #ffd700; }
.action-btn.fight { border-left: 3px solid #ff6b6b; }
.action-btn.pass { border-left: 3px solid #666; }
.action-filter {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 3px 8px;
  border: 1px solid #0f3460;
  border-radius: 3px;
  background: #1a1a2e;
  color: #888;
  cursor: pointer;
  font-size: 10px;
  flex: none;
}
.filter-btn.active { background: #0f3460; color: #fff; }

#log-panel {
  height: 180px;
  min-height: 100px;
  overflow-y: auto;
  padding: 8px 12px;
  background: #111;
  font-size: 11px;
  font-family: 'Consolas', monospace;
  border-top: 2px solid #0f3460;
}
.log-line { padding: 1px 0; }
.log-ai { color: #4ecdc4; }
.log-you { color: #e94560; }

/* -- Main board -- */
#main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
  position: relative;
  overflow: auto;
}
canvas { border: 2px solid #0f3460; }
#tooltip {
  position: absolute;
  display: none;
  background: rgba(15, 52, 96, 0.95);
  color: #fff;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 11px;
  pointer-events: none;
  white-space: nowrap;
  z-index: 100;
}
</style>
</head>
<body>

<!-- Pregame overlay: choose who goes first -->
<div id="pregame-overlay">
  <div id="pregame-box">
    <h2>Warhammer 40K</h2>
    <p>Tau (AI) vs Blood Angels (You)</p>
    <button class="pregame-btn" id="btn-go-first">I Go First</button>
    <button class="pregame-btn" id="btn-go-second">AI Goes First</button>
  </div>
</div>

<div id="sidebar">
  <h1>Warhammer 40K</h1>
  <div id="info-bar">
    <div class="info-item"><div class="info-label">Turn</div><div class="info-value" id="turn-num">1</div></div>
    <div class="info-item"><div class="info-label">Your VP</div><div class="info-value vp-you" id="vp-you">0</div></div>
    <div class="info-item"><div class="info-label">AI VP</div><div class="info-value vp-ai" id="vp-ai">0</div></div>
    <div class="info-item"><div class="info-label">Phase</div><div class="info-value" id="phase-name">-</div></div>
  </div>
  <div id="phase-bar">Waiting...</div>
  <div id="move-hint">Drag a unit to move it (circle = max range)</div>
  <div id="btn-row">
    <button id="btn-ai-step" style="display:none">Next AI Action</button>
    <button id="btn-pass">Pass Phase</button>
    <button id="btn-reset">New Game</button>
  </div>
  <div id="unit-detail"><em>Click a unit on the board to see its stats</em></div>
  <div id="actions-panel">
    <h3>Actions</h3>
    <div class="action-filter" id="action-filter"></div>
    <div id="action-list"></div>
  </div>
  <div id="log-panel"></div>
</div>

<div id="main">
  <canvas id="board"></canvas>
  <div id="tooltip"></div>
</div>

<script>
const SCALE = 14;
let state = null;
let actions = [];
let selectedUnitId = null;
let hoveredUnitId = null;
let filterType = "all";

let dragging = null;
let dragPos = null;
let dragValid = false;
let dragStartMouse = null;
let dragOffset = null;

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");
const pregameOverlay = document.getElementById("pregame-overlay");

const DEPLOY_DEPTH = 9;
const OWNER_COLORS = {
  0: { fill: "#4ecdc4", stroke: "#2a9d8f", label: "Tau" },
  1: { fill: "#e94560", stroke: "#c9302c", label: "Blood Angels" },
};

// ---- Pregame ----

document.getElementById("btn-go-first").onclick = () => startGame(true);
document.getElementById("btn-go-second").onclick = () => startGame(false);

async function startGame(humanFirst) {
  pregameOverlay.style.display = "none";
  const r = await fetch("/api/reset", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ human_first: humanFirst }),
  });
  state = await r.json();
  render();
  updateSidebar();
  await fetchActions();
}

// ---- Network ----

async function fetchState() {
  const r = await fetch("/api/state");
  const data = await r.json();
  if (data.waiting) return;
  state = data;
  render();
  updateSidebar();
}

async function fetchActions() {
  const r = await fetch("/api/actions");
  actions = await r.json();
  renderActions();
}

async function sendAction(a) {
  const r = await fetch("/api/act", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(a),
  });
  const data = await r.json();
  state = data.state;
  render();
  updateSidebar();
  await fetchActions();
}

async function sendMove(unitId, x, y) {
  const r = await fetch("/api/move", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ unit_id: unitId, x: x, y: y }),
  });
  const data = await r.json();
  state = data.state;
  render();
  updateSidebar();
  await fetchActions();
  return data.valid;
}

async function aiStep() {
  const r = await fetch("/api/ai_step", { method: "POST" });
  const data = await r.json();
  state = data.state;
  render();
  updateSidebar();
  await fetchActions();
}

async function passPhase() {
  const r = await fetch("/api/pass_phase", { method: "POST" });
  state = await r.json();
  render();
  updateSidebar();
  await fetchActions();
}

async function resetGame() {
  pregameOverlay.style.display = "flex";
}

// ---- Rendering ----

function render() {
  if (!state) return;
  const tw = state.table_w;
  const th = state.table_h;
  canvas.width = tw * SCALE;
  canvas.height = th * SCALE;

  ctx.fillStyle = "#1a1a2e";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid(tw, th);
  drawDeployZones(tw, th);
  drawObjectives();

  if (dragging) drawMoveCircle(dragging);
  drawUnits();
  if (dragging && dragPos) drawDragGhost();
}

function drawGrid(tw, th) {
  ctx.strokeStyle = "#222244";
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= tw; x += 6) {
    ctx.beginPath();
    ctx.moveTo(x * SCALE, 0);
    ctx.lineTo(x * SCALE, th * SCALE);
    ctx.stroke();
  }
  for (let y = 0; y <= th; y += 6) {
    ctx.beginPath();
    ctx.moveTo(0, y * SCALE);
    ctx.lineTo(tw * SCALE, y * SCALE);
    ctx.stroke();
  }
}

function drawDeployZones(tw, th) {
  const humanPid = state.human_player;
  const topColor = humanPid === 1 ? "rgba(233, 69, 96, 0.04)" : "rgba(78, 205, 196, 0.04)";
  const topLine  = humanPid === 1 ? "rgba(233, 69, 96, 0.15)" : "rgba(78, 205, 196, 0.15)";
  const botColor = humanPid === 0 ? "rgba(233, 69, 96, 0.04)" : "rgba(78, 205, 196, 0.04)";
  const botLine  = humanPid === 0 ? "rgba(233, 69, 96, 0.15)" : "rgba(78, 205, 196, 0.15)";

  ctx.fillStyle = botColor;
  ctx.fillRect(0, 0, tw * SCALE, DEPLOY_DEPTH * SCALE);
  ctx.strokeStyle = botLine;
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(0, DEPLOY_DEPTH * SCALE);
  ctx.lineTo(tw * SCALE, DEPLOY_DEPTH * SCALE);
  ctx.stroke();

  ctx.fillStyle = topColor;
  ctx.fillRect(0, (th - DEPLOY_DEPTH) * SCALE, tw * SCALE, DEPLOY_DEPTH * SCALE);
  ctx.strokeStyle = topLine;
  ctx.beginPath();
  ctx.moveTo(0, (th - DEPLOY_DEPTH) * SCALE);
  ctx.lineTo(tw * SCALE, (th - DEPLOY_DEPTH) * SCALE);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawObjectives() {
  for (const obj of state.objectives) {
    ctx.beginPath();
    ctx.arc(obj.x * SCALE, obj.y * SCALE, obj.r * SCALE, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 215, 0, 0.12)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255, 215, 0, 0.5)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = "rgba(255, 215, 0, 0.6)";
    ctx.font = "bold 11px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("OBJ", obj.x * SCALE, obj.y * SCALE + 4);
  }
}

function drawMoveCircle(unit) {
  const x = unit.x * SCALE;
  const y = unit.y * SCALE;
  const r = unit.M * SCALE;

  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(78, 205, 196, 0.08)";
  ctx.fill();
  ctx.strokeStyle = "rgba(78, 205, 196, 0.6)";
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 5]);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = "rgba(78, 205, 196, 0.15)";
  ctx.lineWidth = 0.5;
  for (let frac = 0.25; frac < 1.0; frac += 0.25) {
    ctx.beginPath();
    ctx.arc(x, y, r * frac, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawDragGhost() {
  if (!dragging || !dragPos) return;
  const gx = dragPos.x * SCALE;
  const gy = dragPos.y * SCALE;
  const r = Math.max(dragging.base_r * SCALE, 5);

  ctx.beginPath();
  ctx.arc(gx, gy, r, 0, Math.PI * 2);
  ctx.fillStyle = dragValid ? "rgba(78, 205, 196, 0.5)" : "rgba(233, 69, 96, 0.5)";
  ctx.fill();
  ctx.strokeStyle = dragValid ? "#4ecdc4" : "#e94560";
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 3]);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.beginPath();
  ctx.moveTo(dragging.x * SCALE, dragging.y * SCALE);
  ctx.lineTo(gx, gy);
  ctx.strokeStyle = dragValid ? "rgba(78, 205, 196, 0.4)" : "rgba(233, 69, 96, 0.4)";
  ctx.lineWidth = 1;
  ctx.stroke();

  const dist = Math.sqrt((dragPos.x - dragging.x) ** 2 + (dragPos.y - dragging.y) ** 2);
  ctx.font = "bold 11px sans-serif";
  ctx.fillStyle = dragValid ? "#4ecdc4" : "#e94560";
  ctx.textAlign = "center";
  const midX = (dragging.x * SCALE + gx) / 2;
  const midY = (dragging.y * SCALE + gy) / 2;
  ctx.fillText(dist.toFixed(1) + '"', midX, midY - 8);
}

function drawUnits() {
  const humanPid = state.human_player;
  for (const u of state.units) {
    if (!u.alive) continue;
    if (dragging && u.id === dragging.id && dragPos) continue;

    const x = u.x * SCALE;
    const y = u.y * SCALE;
    const r = Math.max(u.base_r * SCALE, 5);
    const isHuman = u.owner === humanPid;
    const colors = isHuman
      ? { fill: "#e94560", stroke: "#c9302c" }
      : { fill: "#4ecdc4", stroke: "#2a9d8f" };

    const isSelected = u.id === selectedUnitId;
    const isHovered = u.id === hoveredUnitId;
    const canMove = u.can_move && state.phase === "movement" && state.is_human_turn;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? "#fff" : isHovered ? lighten(colors.fill, 0.3) : colors.fill;
    ctx.globalAlpha = u.W < u.max_W ? 0.6 : 0.9;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = isSelected ? "#ffd700" : canMove ? "#4ecdc4" : colors.stroke;
    ctx.lineWidth = isSelected ? 2.5 : canMove ? 2 : 1.2;
    ctx.stroke();

    if (canMove && !isSelected) {
      ctx.beginPath();
      ctx.arc(x, y, r + 3, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(78, 205, 196, 0.5)";
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    if (u.is_leader) {
      ctx.beginPath();
      ctx.arc(x, y, r + 5, 0, Math.PI * 2);
      ctx.strokeStyle = "#ffd700";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    if (u.W < u.max_W) {
      const pct = u.W / u.max_W;
      const bw = r * 1.8;
      ctx.fillStyle = "#300";
      ctx.fillRect(x - bw / 2, y - r - 8, bw, 4);
      ctx.fillStyle = pct > 0.5 ? "#4ecdc4" : pct > 0.25 ? "#ffd700" : "#e94560";
      ctx.fillRect(x - bw / 2, y - r - 8, bw * pct, 4);
    }

    ctx.font = "bold 9px sans-serif";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    const label = u.name.length > 12 ? u.name.split(" ")[0] : u.name;
    ctx.fillText(label, x, y + r + 12);
  }
}

// ---- Sidebar ----

function updateSidebar() {
  if (!state) return;
  document.getElementById("turn-num").textContent = state.turn;

  const humanPid = String(state.human_player);
  const aiPid = String(state.ai_player);
  document.getElementById("vp-you").textContent = state.vp[humanPid] || 0;
  document.getElementById("vp-ai").textContent = state.vp[aiPid] || 0;
  document.getElementById("phase-name").textContent = state.phase;

  const bar = document.getElementById("phase-bar");
  if (state.game_over) {
    const msg = state.winner === state.human_player ? "YOU WIN!" : state.winner === state.ai_player ? "AI WINS" : "DRAW";
    bar.textContent = "Game Over - " + msg;
    bar.className = "game-over-bar";
  } else if (state.is_human_turn) {
    bar.textContent = "Your " + state.phase + " phase";
    bar.className = "your-turn";
  } else {
    bar.textContent = "AI " + state.phase + " phase (" + state.ai_actions_remaining + " actions left)";
    bar.className = "ai-turn";
  }

  const moveHint = document.getElementById("move-hint");
  if (state.is_human_turn && state.phase === "movement" && !state.game_over) {
    moveHint.style.display = "block";
  } else {
    moveHint.style.display = "none";
  }

  const btnAiStep = document.getElementById("btn-ai-step");
  const btnPass = document.getElementById("btn-pass");

  if (state.is_ai_turn) {
    btnAiStep.style.display = "";
    btnAiStep.disabled = false;
    btnPass.textContent = "Skip AI Phase";
    btnPass.disabled = false;
  } else {
    btnAiStep.style.display = "none";
    btnPass.textContent = "Pass Phase";
    btnPass.disabled = !state.is_human_turn || state.game_over;
  }

  const log = document.getElementById("log-panel");
  log.innerHTML = state.log.map(function(l) {
    let cls = "";
    if (l.startsWith("[AI]")) cls = "log-ai";
    else if (l.startsWith("[You]")) cls = "log-you";
    return '<div class="log-line ' + cls + '">' + l + '</div>';
  }).join("");
  log.scrollTop = log.scrollHeight;
}

function renderActions() {
  const container = document.getElementById("action-list");
  const filterDiv = document.getElementById("action-filter");

  if (!state || state.is_ai_turn) {
    container.innerHTML = '<div style="color:#4ecdc4;font-size:11px;padding:8px">AI is playing... click "Next AI Action" to step through</div>';
    filterDiv.innerHTML = "";
    return;
  }

  const nonMoveActions = actions.filter(function(a) { return a.action_type !== 1; });

  const types = new Set(nonMoveActions.map(function(a) { return a.action_type; }));
  const typeNames = { 0: "Pass", 2: "Shoot", 3: "Charge", 4: "Fight" };
  const typeClasses = { 0: "pass", 2: "shoot", 3: "charge", 4: "fight" };

  filterDiv.innerHTML = '<span class="filter-btn ' + (filterType === "all" ? "active" : "") + '" data-f="all">All</span>';
  for (var ti = 0; ti < [2, 3, 4, 0].length; ti++) {
    var t = [2, 3, 4, 0][ti];
    if (types.has(t)) {
      filterDiv.innerHTML += '<span class="filter-btn ' + (filterType === String(t) ? "active" : "") + '" data-f="' + t + '">' + typeNames[t] + '</span>';
    }
  }
  filterDiv.querySelectorAll(".filter-btn").forEach(function(btn) {
    btn.onclick = function() { filterType = btn.dataset.f; renderActions(); };
  });

  var filtered = nonMoveActions;
  if (filterType !== "all") {
    filtered = nonMoveActions.filter(function(a) { return a.action_type === parseInt(filterType); });
  }
  if (selectedUnitId !== null) {
    var forSelected = filtered.filter(function(a) { return a.unit_id === selectedUnitId; });
    if (forSelected.length > 0) filtered = forSelected;
  }

  container.innerHTML = "";

  if (state && state.is_human_turn && state.phase === "movement") {
    var hint = document.createElement("div");
    hint.style.cssText = "color:#4ecdc4;font-size:11px;padding:4px 0 8px;font-style:italic";
    hint.textContent = "Drag units on the board to move them";
    container.appendChild(hint);
  }

  for (var i = 0; i < Math.min(filtered.length, 80); i++) {
    var a = filtered[i];
    var btn = document.createElement("button");
    btn.className = "action-btn " + (typeClasses[a.action_type] || "");
    btn.textContent = a.label;
    btn.onclick = (function(act) { return function() { sendAction(act); }; })(a);
    container.appendChild(btn);
  }

  if (filtered.length === 0 && !(state && state.phase === "movement")) {
    container.innerHTML = '<div style="color:#666;font-size:11px;padding:8px">No actions available</div>';
  }
}

function showUnitDetail(u) {
  var panel = document.getElementById("unit-detail");
  if (!u) {
    panel.innerHTML = "<em>Click a unit on the board to see its stats</em>";
    return;
  }
  var side = (u.owner === state.human_player) ? "You" : "AI";
  var color = (u.owner === state.human_player) ? "#e94560" : "#4ecdc4";
  var wpns = u.weapons.map(function(w) {
    return w.name + ": " + (w.range > 0 ? w.range + '"' : 'Melee') + " A" + w.attacks + " S" + w.strength + " AP" + w.ap + " D" + w.damage;
  }).join("<br>");
  panel.innerHTML =
    '<h3 style="color:' + color + '">' + u.name + ' (' + side + ')' + (u.is_leader ? ' \u2605' : '') + '</h3>' +
    '<div style="font-size:11px;color:#888;margin-bottom:4px">' + u.squad_name + '</div>' +
    '<div class="stat-row">' +
    '<span class="stat">M' + u.M + '"</span>' +
    '<span class="stat">T' + u.T + '</span>' +
    '<span class="stat">Sv' + u.Sv + '+</span>' +
    '<span class="stat">W' + u.W + '/' + u.max_W + '</span>' +
    '<span class="stat">OC' + u.OC + '</span>' +
    '</div>' +
    '<div style="font-size:11px;margin-top:4px">' + wpns + '</div>';
}

// ---- Interaction ----

function findUnitAt(mx, my) {
  if (!state) return null;
  var bestDist = Infinity;
  var best = null;
  for (var i = 0; i < state.units.length; i++) {
    var u = state.units[i];
    if (!u.alive) continue;
    var dx = u.x - mx, dy = u.y - my;
    var d = Math.sqrt(dx * dx + dy * dy);
    var hitR = Math.max(u.base_r, 1.2);
    if (d < hitR && d < bestDist) {
      bestDist = d;
      best = u;
    }
  }
  return best;
}

canvas.addEventListener("mousedown", function(e) {
  if (!state || !state.is_human_turn || state.phase !== "movement") return;
  var rect = canvas.getBoundingClientRect();
  var mx = (e.clientX - rect.left) / SCALE;
  var my = (e.clientY - rect.top) / SCALE;

  var u = findUnitAt(mx, my);
  if (u && u.can_move && u.owner === state.human_player) {
    dragging = u;
    dragStartMouse = { x: mx, y: my };
    dragOffset = { x: mx - u.x, y: my - u.y };
    dragPos = { x: u.x, y: u.y };
    dragValid = true;
    canvas.style.cursor = "grabbing";
    e.preventDefault();
    render();
  }
});

canvas.addEventListener("mousemove", function(e) {
  if (!state) return;
  var rect = canvas.getBoundingClientRect();
  var mx = (e.clientX - rect.left) / SCALE;
  var my = (e.clientY - rect.top) / SCALE;

  if (dragging) {
    var newX = mx - dragOffset.x;
    var newY = my - dragOffset.y;
    dragPos = { x: newX, y: newY };
    dragValid = checkDragValid(dragging, newX, newY);
    tooltip.style.display = "none";
    render();
    return;
  }

  var found = findUnitAt(mx, my);
  var newHover = found ? found.id : null;
  if (newHover !== hoveredUnitId) {
    hoveredUnitId = newHover;
    render();
  }

  if (found) {
    tooltip.style.display = "block";
    tooltip.style.left = (e.clientX - canvas.parentElement.getBoundingClientRect().left + 14) + "px";
    tooltip.style.top = (e.clientY - canvas.parentElement.getBoundingClientRect().top - 12) + "px";
    var side = (found.owner === state.human_player) ? "You" : "AI";
    tooltip.innerHTML = "<b>" + found.name + "</b> (" + side + ")<br>W" + found.W + "/" + found.max_W + " T" + found.T + " Sv" + found.Sv + "+";
    if (found.can_move && state.phase === "movement" && state.is_human_turn) {
      tooltip.innerHTML += '<br><em style="color:#4ecdc4">Drag to move (M' + found.M + '")</em>';
    }
  } else {
    tooltip.style.display = "none";
  }

  if (state.is_human_turn && state.phase === "movement") {
    canvas.style.cursor = (found && found.can_move && found.owner === state.human_player) ? "grab" : "crosshair";
  } else {
    canvas.style.cursor = "crosshair";
  }
});

canvas.addEventListener("mouseup", async function(e) {
  if (!dragging) return;

  var rect = canvas.getBoundingClientRect();
  var mx = (e.clientX - rect.left) / SCALE;
  var my = (e.clientY - rect.top) / SCALE;
  var finalX = mx - dragOffset.x;
  var finalY = my - dragOffset.y;

  var dist = Math.sqrt((finalX - dragging.x) ** 2 + (finalY - dragging.y) ** 2);

  if (dist > 0.3 && checkDragValid(dragging, finalX, finalY)) {
    await sendMove(dragging.id, finalX, finalY);
  }

  dragging = null;
  dragPos = null;
  dragValid = false;
  dragOffset = null;
  dragStartMouse = null;
  canvas.style.cursor = "crosshair";
  render();
});

canvas.addEventListener("mouseleave", function() {
  tooltip.style.display = "none";
  if (dragging) {
    dragging = null;
    dragPos = null;
    dragValid = false;
    dragOffset = null;
    dragStartMouse = null;
    canvas.style.cursor = "crosshair";
  }
  hoveredUnitId = null;
  render();
});

canvas.addEventListener("click", function(e) {
  if (dragging) return;
  if (!state) return;
  var rect = canvas.getBoundingClientRect();
  var mx = (e.clientX - rect.left) / SCALE;
  var my = (e.clientY - rect.top) / SCALE;

  var found = findUnitAt(mx, my);
  selectedUnitId = found ? found.id : null;
  showUnitDetail(found);
  render();
  renderActions();
});

function checkDragValid(unit, mx, my) {
  var dist = Math.sqrt((mx - unit.x) ** 2 + (my - unit.y) ** 2);
  if (dist > unit.M + 0.01) return false;
  if (mx < unit.base_r || mx > state.table_w - unit.base_r) return false;
  if (my < unit.base_r || my > state.table_h - unit.base_r) return false;
  return true;
}

document.getElementById("btn-ai-step").onclick = aiStep;
document.getElementById("btn-pass").onclick = passPhase;
document.getElementById("btn-reset").onclick = resetGame;

function lighten(hex, amt) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + Math.round(amt * 255));
  g = Math.min(255, g + Math.round(amt * 255));
  b = Math.min(255, b + Math.round(amt * 255));
  return "rgb(" + r + "," + g + "," + b + ")";
}

// On page load, just show the pregame overlay. No fetchState until user chooses.
